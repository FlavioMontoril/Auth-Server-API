services:
  db:
    image: postgres:16-alpine
    container_name: auth-server-db
    restart: always
    environment:
      POSTGRES_DB: ${DOCKER_DB_NAME}
      POSTGRES_USER: ${DOCKER_DB_USERNAME}
      POSTGRES_PASSWORD: ${DOCKER_DB_PASSWORD}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DOCKER_DB_USERNAME} -d ${DOCKER_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: auth-server-api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # Spring lê estas variáveis que vêm do .env via Docker Compose
      DB_URL: ${DOCKER_DB_URL}
      DB_USERNAME: ${DOCKER_DB_USERNAME}
      DB_PASSWORD: ${DOCKER_DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      API_SECURITY_TOKEN_ISSUER: ${API_SECURITY_TOKEN_ISSUER}

volumes:
  postgres_data:
